# .github/workflows/terraform-plan.yml
name: Terraform Plan
on:
  pull_request:
    paths:
      - 'infrastructure/terraform/**'
      - '.github/workflows/terraform-*'

env:
  IONOS_TOKEN: ${{ secrets.IONOS_TOKEN }}
  TF_VAR_ionos_token: ${{ secrets.IONOS_TOKEN }}

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.6.0
    
    - name: Configure IONOS CLI
      run: |
        curl -sL https://github.com/ionos-cloud/ionosctl/releases/download/v6.7.0/ionosctl-6.7.0-linux-amd64.tar.gz | tar -xzC /tmp
        sudo mv /tmp/ionosctl /usr/local/bin/
        ionosctl version
    
    - name: Terraform Init
      working-directory: infrastructure/terraform/environments/staging
      run: terraform init
    
    - name: Terraform Plan
      working-directory: infrastructure/terraform/environments/staging
      run: terraform plan -no-color
      continue-on-error: true
      id: plan
    
    - name: Update Pull Request
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const output = `#### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
          
          <details><summary>Show Plan</summary>
          
          \`\`\`terraform
          ${{ steps.plan.outputs.stdout }}
          \`\`\`
          
          </details>`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })
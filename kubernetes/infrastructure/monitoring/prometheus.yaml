apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "55.5.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Prometheus Configuration
    prometheus:
      prometheusSpec:
        nodeSelector:
          node-type: monitoring
        
        retention: 30d
        retentionSize: 10GB
        
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
        
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: ionos-ssd
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 20Gi
        
        additionalScrapeConfigs: |
          - job_name: 'kubernetes-pods'
            kubernetes_sd_configs:
            - role: pod
            relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              target_label: __address__
        
        ruleSelector:
          matchLabels:
            prometheus: kube-prometheus
            role: alert-rules
    
    # Grafana Configuration
    grafana:
      nodeSelector:
        node-type: monitoring
      
      persistence:
        enabled: true
        storageClassName: ionos-ssd
        size: 5Gi
      
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      
      adminPassword: admin123!  # Change this in production
      
      ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          nginx.ingress.kubernetes.io/rewrite-target: /
        hosts:
          - grafana.yourdomain.com  # Replace with your domain
        tls:
          - secretName: grafana-tls
            hosts:
              - grafana.yourdomain.com
      
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
          - name: 'default'
            orgId: 1
            folder: ''
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default
      
      dashboards:
        default:
          kubernetes-cluster:
            gnetId: 7249
            revision: 1
            datasource: Prometheus
          kubernetes-pods:
            gnetId: 6417
            revision: 1
            datasource: Prometheus
          nginx-ingress:
            gnetId: 9614
            revision: 1
            datasource: Prometheus
          wordpress:
            gnetId: 1860
            revision: 37
            datasource: Prometheus
    
    # AlertManager Configuration
    alertmanager:
      alertmanagerSpec:
        nodeSelector:
          node-type: monitoring
        
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: ionos-ssd
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 5Gi
    
    # Node Exporter Configuration
    nodeExporter:
      enabled: true
    
    # Kube State Metrics Configuration
    kubeStateMetrics:
      enabled: true
    
    # Prometheus Operator Configuration
    prometheusOperator:
      nodeSelector:
        node-type: monitoring
      
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi 
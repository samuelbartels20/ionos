apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: ingress-nginx
spec:
  interval: 15m
  chart:
    spec:
      chart: ingress-nginx
      version: "4.10.0"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
        namespace: flux-system
      interval: 15m
  values:
    controller:
      replicaCount: 3
      nodeSelector:
        workload: system
      tolerations:
        - key: node-type
          operator: Equal
          value: system
          effect: NoSchedule
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 128Mi
      service:
        type: LoadBalancer
        annotations:
          service.beta.kubernetes.io/ionos-load-balancer-forwarding-rules: |
            [
              {
                "name": "http",
                "listenerIp": "*",
                "listenerPort": 80,
                "targetPort": 80,
                "protocol": "HTTP",
                "healthCheck": {
                  "checkInterval": "2000ms"
                }
              },
              {
                "name": "https",
                "listenerIp": "*", 
                "listenerPort": 443,
                "targetPort": 443,
                "protocol": "HTTP",
                "healthCheck": {
                  "checkInterval": "2000ms"
                }
              }
            ]
      metrics:
        enabled: true
        serviceMonitor:
          enabled: true
          namespace: monitoring
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 65534
      containerSecurityContext:
        runAsNonRoot: true
        runAsUser: 101
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
          add:
            - NET_BIND_SERVICE
        readOnlyRootFilesystem: true
    defaultBackend:
      enabled: true
      nodeSelector:
        workload: system
      tolerations:
        - key: node-type
          operator: Equal
          value: system
          effect: NoSchedule
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 24h
  url: https://kubernetes.github.io/ingress-nginx 
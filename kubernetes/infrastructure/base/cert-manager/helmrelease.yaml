apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 15m
  chart:
    spec:
      chart: cert-manager
      version: "v1.14.4"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      interval: 15m
  values:
    installCRDs: true
    replicaCount: 3
    nodeSelector:
      workload: system
    tolerations:
      - key: node-type
        operator: Equal
        value: system
        effect: NoSchedule
    resources:
      limits:
        cpu: 200m
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi
    webhook:
      replicaCount: 3
      nodeSelector:
        workload: system
      tolerations:
        - key: node-type
          operator: Equal
          value: system
          effect: NoSchedule
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 32Mi
    cainjector:
      replicaCount: 3
      nodeSelector:
        workload: system
      tolerations:
        - key: node-type
          operator: Equal
          value: system
          effect: NoSchedule
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 50m
          memory: 128Mi
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
        namespace: monitoring
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 1000
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: jetstack
  namespace: flux-system
spec:
  interval: 24h
  url: https://charts.jetstack.io 
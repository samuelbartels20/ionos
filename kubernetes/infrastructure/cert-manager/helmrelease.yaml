apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 10m
  chart:
    spec:
      chart: cert-manager
      version: "1.13.3"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: flux-system
      interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    installCRDs: true
    
    global:
      leaderElection:
        namespace: cert-manager
    
    nodeSelector:
      node-type: system
    
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 128Mi
    
    webhook:
      nodeSelector:
        node-type: system
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
    
    cainjector:
      nodeSelector:
        node-type: system
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 128Mi
    
    startupapicheck:
      nodeSelector:
        node-type: system
    
    prometheus:
      enabled: true
      servicemonitor:
        enabled: true
        labels:
          app.kubernetes.io/name: cert-manager 
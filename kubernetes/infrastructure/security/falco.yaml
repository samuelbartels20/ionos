apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: falcosecurity
  namespace: flux-system
spec:
  interval: 1h
  url: https://falcosecurity.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: falco
  namespace: security
spec:
  interval: 10m
  chart:
    spec:
      chart: falco
      version: "3.8.4"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
      interval: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    nodeSelector:
      node-type: system
    
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    
    falco:
      grpc:
        enabled: true
      grpcOutput:
        enabled: true
      httpOutput:
        enabled: true
        url: "http://falcosidekick:2801/"
    
    serviceMonitor:
      enabled: true
      additionalLabels:
        app.kubernetes.io/name: falco 